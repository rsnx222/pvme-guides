name: Spellcheck

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cspell + dictionaries
        run: |
          npm install -g \
            cspell@latest \
            @cspell/dict-software-terms \
            @cspell/dict-gaming-terms

      - name: Run spellcheck (capture output + summary)
        id: spell
        run: |
          # Run cspell (config controls scope)
          cspell \
            --config .github/cspell/cspell.json \
            --no-progress \
            --no-summary \
            --relative \
            > spellcheck.txt || true

          # Detect actual spelling issues
          if grep -q "Unknown word" spellcheck.txt; then
            echo "found=true" >> $GITHUB_OUTPUT

            # Extract unique words
            sed -n 's/.*Unknown word (\([^)]*\)).*/\1/p' spellcheck.txt \
              | tr '[:upper:]' '[:lower:]' \
              | sort -u > unique.txt

            echo "" >> spellcheck.txt
            echo "==============================" >> spellcheck.txt
            echo "Unique flagged words:" >> spellcheck.txt
            echo "==============================" >> spellcheck.txt

            cat unique.txt >> spellcheck.txt
            echo "==============================" >> spellcheck.txt

          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.spell.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: spellcheck.txt
          edit-mode: replace

      - name: Fail if issues found
        if: steps.spell.outputs.found == 'true'
        run: exit 1
