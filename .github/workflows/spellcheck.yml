name: Spellcheck

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  spellcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install cspell + dictionaries
        run: |
          npm install -g \
            cspell@latest \
            @cspell/dict-software-terms \
            @cspell/dict-gaming-terms

      - name: Run spellcheck on changed txt files
        id: spell
        shell: bash
        run: |
          REPORT=/tmp/spellcheck.txt

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git diff --name-only --diff-filter=ACMRT \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
              | grep -E '\.txt$' \
              | cspell \
                  --config .github/cspell/cspell.json \
                  --file-list stdin \
                  --no-progress \
                  --no-summary \
                  --relative \
                  | tee "$REPORT" || true
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"

            if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              git diff-tree --no-commit-id --name-only -r --diff-filter=ACMRT "$AFTER" \
                | grep -E '\.txt$' \
                | cspell \
                    --config .github/cspell/cspell.json \
                    --file-list stdin \
                    --no-progress \
                    --no-summary \
                    --relative \
                    | tee "$REPORT" || true
            else
              git diff --name-only --diff-filter=ACMRT "$BEFORE" "$AFTER" \
                | grep -E '\.txt$' \
                | cspell \
                    --config .github/cspell/cspell.json \
                    --file-list stdin \
                    --no-progress \
                    --no-summary \
                    --relative \
                    | tee "$REPORT" || true
            fi
          fi

          if grep -q "Unknown word" "$REPORT"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            cp "$REPORT" spellcheck.txt
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.spell.outputs.found == 'true'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-path: spellcheck.txt
          edit-mode: replace

      - name: Fail if issues found
        if: steps.spell.outputs.found == 'true'
        run: exit 1